#
# deploy-to-build-dev.yml — staging deploy gate (develop branch)
#
# Trigger: push to develop + manual workflow_dispatch.
# Steps:   checkout -> node 20 -> npm ci -> precheck -> build -> push dist/
#          to build-dev branch via s0/git-publish-subdir-action.
# Staging environment can be paired with Hostinger subdomain or used for
# preview-link sharing. Concurrency group prevents overlapping runs.

name: kyo-web-online - Build and Deploy to build-dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: deploy-build-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Run precheck gate
        run: npm run precheck

      - name: Build App
        run: npm run build

      - name: Push to build-dev
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: build-dev
          FOLDER: dist
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "Build in Dev Environment: ({sha}) {msg}"
          SQUASH_HISTORY: true
