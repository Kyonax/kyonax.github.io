#
# deploy-to-build-main.yml — Hostinger production deploy gate
#
# Trigger: push to main + manual workflow_dispatch.
# Steps:   checkout -> node 20 -> npm ci -> precheck -> build -> push dist/
#          to build-main branch via s0/git-publish-subdir-action.
# Hostinger hPanel Git integration pulls build-main into /public_html/.
# Concurrency group prevents overlapping runs (no half-pushed branch state).

name: kyo-web-online - Build and Deploy to build-main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-build-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run precheck gate
        run: npm run precheck

      - name: Build App
        run: npm run build

      - name: Push to build-main
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: build-main
          FOLDER: dist
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "Build in Main Environment: ({sha}) {msg}"
          SQUASH_HISTORY: true
