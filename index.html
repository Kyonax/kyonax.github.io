<!doctype html>
<html lang="en">
  <head>
    <!--
     ! Copyright (c) 2026 Cristian D. Moreno — @Kyonax
     ! Distributed under the terms of GPL-2.0-only — see LICENSE.
     !
     ! Root index.html — Vite convention.
     !
     ! What lives here (static / build-time):
     !   - charset + viewport + favicon links + gtag bootstrap
     !   - preconnect (conditional via vite-plugin-html, gated by FEATURES.vimeo.preconnect)
     !   - LCP <link rel="preload"> for the hero image (Phase 7.2)
     !   - inline critical CSS (auto-extracted by vite-plugin-beasties — Phase 7.3)
     !
     ! What's managed by Vue (runtime / locale-reactive):
     !   - <title>, description, keywords, author
     !   - og:* and twitter:* tags
     !   - theme-color
     !   See src/composables/use-seo-head.js
    -->

    <!-- Google Analytics — gtag.js -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6M3P3M2HG5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", "G-6M3P3M2HG5");
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
     ! LCP preload — kicks off the hero image fetch during HTML parse,
     ! before the JS bundle loads. Sources align with BlastImage's `sizes`
     ! attribute on the kyonax_multiverse_characters portrait. Build-time
     ! resolution of the hashed asset URLs is handled by vite-plugin-html
     ! (see vite.config.js inject.data.lcpPreload).
    -->
    <%- lcpPreload %>

    <!--
     ! Conditional preconnect injected by vite-plugin-html.
     ! Resolves to a real <link rel="preconnect"> when FEATURES.vimeo.preconnect
     ! is on, or to an empty string when the flag is off (tree-shakeable).
    -->
    <%- vimeoPreconnect %>

    <!-- Favicons (static — generated by Grunt build-all step) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <title>I'm Kyo</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
