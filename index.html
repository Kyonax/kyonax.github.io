      index.html — Vite SPA entry + SSG hydration target
      2026-05-14

      The only HTML file. Vite uses it as the entry template;
      vite-ssg prerenders it once per route (en / es / privacy /
      es/privacy) with vue-i18n setting locale-specific title,
      meta, JSON-LD, OG. Hosts the AD-10 Google Consent Mode v2
      default-deny gtag block above all other scripts so consent
      state lands before any analytics event.

        Consent Mode v2 default-deny gtag block
        transformIndexHtml slots (lcpPreload, vimeoPreconnect)
        Favicons (ico + png + apple-touch)
        Root mount target #root (NOT #app — vite-ssg rootContainer)

      Guidelines:
        Tier 1 header lives INSIDE <head> so the DOCTYPE stays
          the very first thing in the document — comments before
          the DOCTYPE put some browsers in quirks mode, which
          breaks inline-SVG sizing and inline-flex baselines
          (icon-glyph, brand-icon)
        The gtag default-deny block MUST precede gtag.js src
        #root container stays empty in dev; vite-ssg fills it on build
    -->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Must precede gtag.js so default-deny fires before any event
         transmission. cookie-consent.vue flips this on user accept. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('consent', 'default', {
        'ad_storage':           'denied',
        'ad_user_data':         'denied',
        'ad_personalization':   'denied',
        'analytics_storage':    'denied',
        'functionality_storage':'granted',
        'security_storage':     'granted',
        'wait_for_update':      500
      });
      try {
        var stored = localStorage.getItem('kyo:consent');
        if (stored === 'granted') {
          gtag('consent', 'update', {
            ad_storage: 'granted', ad_user_data: 'granted',
            ad_personalization: 'granted', analytics_storage: 'granted'
          });
        }
      } catch (e) {}
      gtag('js', new Date());
      gtag('config', 'G-6M3P3M2HG5', { 'anonymize_ip': true });
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6M3P3M2HG5"></script>

    <%- lcpPreload %>
    <%- vimeoPreconnect %>

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="57x57" href="/apple-touch-icon.png" />

    <title>Cristian D. Moreno — Frontend & Full-Stack Engineer | Kyonax</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
